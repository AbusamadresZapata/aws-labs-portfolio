version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd invoice-digitizer/frontend
        - npm ci
    build:
      commands:
        - cd invoice-digitizer/frontend
        - npm run build
  artifacts:
    baseDirectory: invoice-digitizer/frontend/build
    files:
      - '**/*'
  cache:
    paths:
      - invoice-digitizer/frontend/node_modules/**/*
