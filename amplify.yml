version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - cd invoice-digitizer/frontend && npm install
    build:
      commands:
        - npm run build --prefix invoice-digitizer/frontend
  artifacts:
    baseDirectory: invoice-digitizer/frontend/build
    files:
      - '**/*'
  cache:
    paths:
      - invoice-digitizer/frontend/node_modules/**/*